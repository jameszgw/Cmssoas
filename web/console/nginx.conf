server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 后端 API / SDK 通道反向代理
    location /api/ { proxy_pass http://backend:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /sdk/ { proxy_pass http://backend:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # SPA 前端路由回退
    location / { try_files $uri $uri/ /index.html; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
