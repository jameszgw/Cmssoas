<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CODEMAN Help Center · By Workflow / By Module (per-function detail)</title>
<meta name="description" content="CODEMAN full operational help: navigate by workflow (steps cross-linked to the exact feature) or by module (broken down to each function, with preconditions/postconditions, required system & user parameters, permission, entry and step-by-step operations)." />
<style>
  :root{
    --bg:#0a0e1a; --panel:#0f1628; --card:#121a30; --card2:#16203a;
    --line:#22304f; --txt:#e8edf7; --mut:#9fb0cd; --dim:#6f80a0;
    --acc:#4f8cff; --acc2:#7c4dff; --ok:#23c483; --warn:#ffb547; --bad:#ff6b6b;
    --grad:linear-gradient(120deg,#4f8cff 0%,#7c4dff 60%,#23c483 120%);
    --side:300px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font:15px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--txt);background:radial-gradient(1100px 600px at 90% -10%,rgba(124,77,255,.14),transparent 60%),var(--bg)}
  a{color:var(--acc);text-decoration:none}
  code,kbd{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.86em;background:rgba(124,77,255,.14);
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#cfe0ff}
  header{position:sticky;top:0;z-index:30;height:60px;display:flex;align-items:center;gap:16px;padding:0 20px;
    background:rgba(10,14,26,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .logo{width:28px;height:28px;border-radius:7px;background:var(--grad);display:grid;place-items:center;font-weight:900;color:#fff}
  header .sp{flex:1}
  header a.lk{color:var(--mut);font-size:13.5px;padding:6px 10px;border-radius:8px}
  header a.lk:hover{color:#fff;background:rgba(255,255,255,.06)}
  #search{background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--txt);
    padding:8px 12px;width:240px;font-size:14px;outline:none}
  #search:focus{border-color:var(--acc)}
  .layout{display:flex;min-height:calc(100vh - 60px)}
  aside{width:var(--side);flex:0 0 var(--side);border-right:1px solid var(--line);
    position:sticky;top:60px;height:calc(100vh - 60px);overflow:auto;padding:16px 12px}
  .tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--mut);font-weight:700;font-size:13.5px;
    padding:8px;border-radius:7px;cursor:pointer;transition:.2s}
  .tabs button.on{background:var(--grad);color:#fff}
  .navgrp{margin-bottom:10px}
  .navgrp h4{margin:14px 8px 6px;font-size:11.5px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase}
  .navlink{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--mut);
    font-size:14px;cursor:pointer;transition:.15s}
  .navlink:hover{background:rgba(255,255,255,.05);color:#fff}
  .navlink.active{background:rgba(79,140,255,.16);color:#fff;border-left:2px solid var(--acc)}
  .navlink .e{width:18px;text-align:center}
  .subnav{margin:2px 0 6px 10px;border-left:1px solid var(--line);padding-left:6px;display:none}
  .subnav.show{display:block}
  .sublink{display:block;padding:4px 8px;border-radius:6px;color:var(--dim);font-size:12.7px;cursor:pointer}
  .sublink:hover{background:rgba(255,255,255,.05);color:#cfe0ff}
  main{flex:1;min-width:0;padding:30px 40px 90px;max-width:960px}
  .crumbs{color:var(--dim);font-size:13px;margin-bottom:6px}
  h1{font-size:28px;margin:0 0 6px;font-weight:850}
  h1 .gr{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .intro{color:var(--mut);margin:0 0 22px;font-size:15px}
  section.doc{display:none;animation:fade .25s ease}
  section.doc.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:20px;margin:30px 0 4px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
  h2.sec .e{font-size:22px}
  h2.sec:first-of-type{border-top:0;padding-top:0;margin-top:6px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
  .tag{font-size:12px;border-radius:7px;padding:4px 10px;border:1px solid var(--line);background:var(--card);white-space:nowrap}
  .tag.perm{color:#bcd0ff;border-color:rgba(79,140,255,.4);background:rgba(79,140,255,.1)}
  .desc{color:var(--mut);margin:0 0 14px}
  ol.steps{counter-reset:s;list-style:none;padding:0;margin:0 0 14px}
  ol.steps>li{position:relative;padding:10px 0 12px 44px;border-bottom:1px dashed rgba(34,48,79,.7)}
  ol.steps>li:last-child{border-bottom:0}
  ol.steps>li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:9px;
    width:28px;height:28px;border-radius:8px;background:var(--grad);color:#fff;font-weight:800;font-size:13px;display:grid;place-items:center}
  ol.steps>li b{color:var(--txt)}
  ol.steps>li .h{color:var(--mut)}
  .see{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:12.5px;
    border:1px solid rgba(79,140,255,.4);background:rgba(79,140,255,.08);color:#bcd0ff;border-radius:999px;padding:3px 10px;cursor:pointer}
  .see:hover{background:rgba(79,140,255,.18);color:#fff}
  .seewrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
  .fn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0;scroll-margin-top:74px}
  .fn:target,.fn.flash{border-color:var(--acc);box-shadow:0 0 0 2px rgba(79,140,255,.25)}
  .fnh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 8px;font-size:17px;font-weight:800}
  .fnh .num{width:24px;height:24px;border-radius:7px;background:rgba(124,77,255,.18);border:1px solid var(--line);
    color:#d8c6ff;font-size:12px;font-weight:800;display:grid;place-items:center}
  .ep{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;color:#9fe0c4;background:#0b1020;
    border:1px solid var(--line);border-radius:7px;padding:4px 10px;display:inline-block;margin:2px 0 10px}
  .ep .m{color:#ffb547;font-weight:700}
  .blk{margin:10px 0}
  .blk .lab{font-weight:800;font-size:12.5px;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;margin-bottom:5px}
  ul.tick,ul.dash{margin:0;padding-left:2px;list-style:none}
  ul.tick li,ul.dash li{position:relative;padding:3px 0 3px 20px;color:var(--mut);font-size:14px}
  ul.tick li::before{content:"✓";position:absolute;left:0;color:var(--ok);font-weight:800}
  ul.dash li::before{content:"→";position:absolute;left:0;color:var(--acc)}
  ol.mini{margin:0;padding-left:20px;color:var(--mut)}
  ol.mini li{padding:2px 0;font-size:14px}
  ol.mini li b{color:var(--txt)}
  table.params{border-collapse:collapse;width:100%;margin:6px 0;font-size:13px}
  table.params th,table.params td{border:1px solid var(--line);padding:6px 10px;text-align:left;vertical-align:top}
  table.params th{background:var(--card2);color:var(--txt);white-space:nowrap}
  table.params td{color:var(--mut)}
  table.params td.n{color:#cfe0ff;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;white-space:nowrap}
  .req{color:var(--bad);font-weight:700}.opt{color:var(--dim)}
  .note{border-radius:9px;padding:9px 14px;margin:9px 0;font-size:13.5px;border:1px solid var(--line)}
  .note .lab{font-weight:800;margin-right:6px}
  .note.tip{background:rgba(35,196,131,.08);border-color:rgba(35,196,131,.3);color:#bdf0da}.note.tip .lab{color:var(--ok)}
  .note.warn{background:rgba(255,181,71,.08);border-color:rgba(255,181,71,.3);color:#ffe0b0}.note.warn .lab{color:var(--warn)}
  .note.faq{background:rgba(255,107,107,.07);border-color:rgba(255,107,107,.3);color:#ffd2d2}.note.faq .lab{color:var(--bad)}
  pre{background:#0b1020;border:1px solid var(--line);border-radius:10px;padding:13px 15px;overflow:auto;
    font:12.5px/1.6 "SF Mono",Menlo,Consolas,monospace;color:#cfe0ff;margin:10px 0}
  pre .c{color:#5f7299}
  table.ref{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px}
  table.ref th,table.ref td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  table.ref th{background:var(--card2)}table.ref td{color:var(--mut)}
  .pager{display:flex;justify-content:space-between;gap:12px;margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
  .pager a{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px;color:var(--mut);transition:.2s}
  .pager a:hover{border-color:var(--acc);color:#fff}.pager a.n{text-align:right}
  .pager small{display:block;color:var(--dim);font-size:11.5px}
  .nohit{color:var(--dim);padding:40px 0;text-align:center}
  .menubtn{display:none;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 12px;cursor:pointer}
  @media(max-width:880px){
    aside{position:fixed;left:0;top:60px;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;box-shadow:0 20px 60px rgba(0,0,0,.6)}
    aside.open{transform:none}
    main{padding:24px 16px 60px}.menubtn{display:inline-block}#search{width:130px}header .lk{display:none}
  }
</style>
</head>
<body>

<header>
  <button class="menubtn" id="menubtn">☰</button>
  <a class="brand" href="index.html"><span class="logo">C</span>CODEMAN Help Center</a>
  <span class="sp"></span>
  <input id="search" type="search" placeholder="Search feature / action / param…" autocomplete="off" />
  <a class="lk" href="help.html">中文</a>
  <a class="lk" href="../../docs/index.html">📚 Docs</a>
  <a class="lk" href="index.html">Landing</a>
</header>

<div class="layout">
  <aside id="aside">
    <div class="tabs">
      <button id="tabFlow" class="on" data-mode="flow">By Workflow</button>
      <button id="tabMod" data-mode="mod">By Module</button>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main id="main"></main>
</div>

<script>
/* ===== Data model (mirror of help.html, English) ===== */
const MOD = [
{ id:"m-tenant", e:"🏢", t:"Tenant Management", intro:"Onboard, activate, renew and isolation config; each tenant gets an isolated space.", perm:"tenant",
  functions:[
   { fid:"fn-tenant-onboard", name:"Onboard Tenant", perm:"tenant:onboard", ep:["POST","/api/tenants"],
     entry:"Console → Tenant Management → “Onboard” dialog (Tenants.vue)",
     pre:["Account holds <code>tenant:onboard</code>","Tenant name is unique"],
     params:[
       {n:"name",t:"String",r:1,d:"Tenant name"},
       {n:"email",t:"String",r:1,d:"Admin email (receives activation mail; must be valid)"},
       {n:"plan",t:"String",r:0,d:"Plan: Basic/Professional/Enterprise/Flagship"},
       {n:"version",t:"String",r:0,d:"Product version, default v2.4.0"},
       {n:"isolation",t:"String",r:0,d:"Shared DB · RLS (default) / dedicated Schema / dedicated Database"},
       {n:"mode",t:"String",r:0,d:"License mode HYBRID (default) / ONLINE / OFFLINE"},
     ],
     steps:["Fill name, admin email; pick plan, version, isolation and mode.","Preview the onboarding email on the right, then submit.","System generates a tenant code (e.g. <code>T-100482</code>) and returns mail result."],
     post:["Creates tenant (INITIALIZING→ACTIVE), isolated Schema, runs Flyway, seeds default roles.","Creates SUPER_ADMIN (pending) + MFA secret + one-time activation token.","Sends onboarding email async; audit <code>TENANT_CREATED</code>."],
     notes:[{k:"faq",t:"Email not received? Check SMTP (<code>APP_MAIL_*</code>) and the outbox; the admin can also activate directly via the activation link."}] },
   { fid:"fn-tenant-list", name:"Tenant List", perm:"tenant:view", ep:["GET","/api/tenants"],
     entry:"Console → Tenant Management (main table)", params:[], pre:[],
     steps:["View all tenants: code/name/email/plan/status/expiry.","Status: active / soon (suspended) / init / exp (failed)."], post:[] },
   { fid:"fn-tenant-settings", name:"View Isolation Settings", perm:"tenant:view", ep:["GET","/api/tenants/{code}/settings"],
     entry:"Console → tenant row → settings/detail",
     params:[{n:"code",t:"Path",r:1,d:"Tenant code"}], pre:["Tenant code exists"],
     steps:["View the tenant Schema name, settings and role count."], post:[] },
   { fid:"fn-tenant-activate", name:"Activate Account (customer · public)", perm:"public (token-validated)", ep:["GET/POST","/api/activation/{token}"],
     entry:"Customer opens activation page <code>/activate/:token</code> (Activate.vue)",
     pre:["Activation token valid & not expired","Admin in PENDING_ACTIVATION"],
     params:[{n:"password",t:"String",r:1,d:"Admin password, length 8–64"},{n:"mfaCode",t:"String",r:0,d:"Optional MFA code; binds MFA if provided"}],
     steps:["GET activation info (tenant/email/MFA QR otpauth).","Set password, optionally scan & bind MFA.","POST to activate."],
     post:["Password hashed; admin → ACTIVE; optional MFA bound; audit <code>ADMIN_ACTIVATED</code>."] },
  ]},

{ id:"m-license", e:"🔑", t:"License Authorization", intro:"Issue/renew/modify/revoke/download/export/auto-expire/reminder/CRL/keys/verify; Ed25519 default, SM2 optional.", perm:"license",
  functions:[
   { fid:"fn-license-issue", name:"Issue License", perm:"license:issue", ep:["POST","/api/licenses/issue"],
     entry:"Console → License → “Issue” (Licensing.vue)",
     pre:["Holds <code>license:issue</code>","Tenant exists","<code>notAfter</code> after <code>notBefore</code>"],
     params:[
       {n:"tenantCode",t:"String",r:1,d:"Tenant code"},
       {n:"customer",t:"String",r:1,d:"Customer name"},
       {n:"productCode",t:"String",r:0,d:"Product, default CODEMAN"},
       {n:"edition",t:"String",r:0,d:"BASIC/PROFESSIONAL/ENTERPRISE/FLAGSHIP, default ENTERPRISE"},
       {n:"mode",t:"String",r:0,d:"OFFLINE/ONLINE/HYBRID, default HYBRID"},
       {n:"modules",t:"List",r:1,d:"Modules, e.g. RISK/REPORT/AUDIT/BI/DATA"},
       {n:"features",t:"Map",r:0,d:"Flags/quotas, e.g. {\"REPORT.EXPORT\":true,\"MAX_USERS\":2000}"},
       {n:"appVersionRange",t:"String",r:0,d:"SemVer range, e.g. >=2.0.0 <3.0.0"},
       {n:"notBefore / notAfter",t:"Date",r:1,d:"Valid-from / valid-until (ISO)"},
       {n:"concurrency",t:"Integer",r:0,d:"Concurrent seats, default 1"},
       {n:"reason",t:"String",r:0,d:"Audit reason"},
     ],
     steps:["Pick tenant/customer/edition/mode; select modules & feature flags.","Set version range, validity dates and seats.","Submit; server signs with private key to produce <code>.lic</code>."],
     post:["License status=ACTIVE, version=1, watermark generated.","claimsJson signed with Ed25519 (kid+signature stored); history opType=ISSUE; audit <code>LICENSE_ISSUED</code>."],
     notes:[{k:"warn",t:"Private key never leaves the server; clients verify with the public key only. Algorithm set by <code>LICENSE_SIGN_ALGO</code> (ed25519/sm2)."}] },
   { fid:"fn-license-renew", name:"Renew", perm:"license:renew", ep:["POST","/api/licenses/{id}/renew"],
     entry:"License list → row action “Renew”",
     pre:["License exists & ACTIVE","new notAfter after current notBefore"],
     params:[{n:"notAfter",t:"Date",r:1,d:"New expiry date"},{n:"reason",t:"String",r:0,d:"Audit reason"}],
     steps:["Dialog pre-fills current expiry; set the new date.","Submit; license re-signed, version +1."],
     post:["notAfter updated; version bumped; re-signed; history RENEW; audit <code>LICENSE_RENEWED</code>."] },
   { fid:"fn-license-modify", name:"Modify (modules/features/seats/edition)", perm:"license:issue", ep:["POST","/api/licenses/{id}/modify"],
     entry:"License list → row action “Modify”", pre:["License exists & ACTIVE"],
     params:[{n:"modules",t:"List",r:0,d:"New modules"},{n:"features",t:"Map",r:0,d:"New flags"},
       {n:"appVersionRange",t:"String",r:0,d:"New version range"},{n:"concurrency",t:"Integer",r:0,d:"New seats"},
       {n:"edition",t:"String",r:0,d:"New edition"},{n:"reason",t:"String",r:0,d:"Audit reason"}],
     steps:["Fill only the fields to change.","Submit; re-signed with new content, version +1."],
     post:["Provided fields updated; version bumped; re-signed; history MODIFY; audit <code>LICENSE_MODIFIED</code>."] },
   { fid:"fn-license-revoke", name:"Revoke", perm:"license:revoke", ep:["POST","/api/licenses/{id}/revoke"],
     entry:"License list → row action “Revoke” (warning confirm)", pre:["License exists & ACTIVE"],
     params:[{n:"reason",t:"String",r:0,d:"Revocation reason"}],
     steps:["Confirm and enter a reason.","Submit; status → REVOKED and enters CRL."],
     post:["status=REVOKED; added to CRL; version bumped & re-signed; history REVOKE; offline SDK rejects via CRL."] },
   { fid:"fn-license-list", name:"List / Detail / History", perm:"license:view / public (detail·history)",
     ep:["GET","/api/licenses · /{id} · /{id}/history"],
     entry:"Console → License (table + detail drawer)", params:[], pre:[],
     steps:["List shows ID/tenant/customer/edition/status/expiry/version.","Detail includes claimsJson & signature; history shows each version’s opType (ISSUE/RENEW/MODIFY/REVOKE/EXPIRE), operator and reason."], post:[] },
   { fid:"fn-license-download", name:"Download .lic / Export CSV", perm:"license:view",
     ep:["GET","/api/licenses/{id}/download · /export.csv"],
     entry:"License row “Download” / list “Export CSV”", params:[], pre:["Download requires JWT (blob download token fix applied)"],
     steps:["“Download” fetches <code>{licenseId}.lic</code> for the customer.","“Export CSV” exports the license ledger."], post:[] },
   { fid:"fn-license-expire", name:"Auto-expire / Expiry Reminder", perm:"license:revoke / license:view",
     ep:["POST","/api/licenses/run-auto-expire · /run-expiry-reminder"],
     entry:"Manual buttons in console; daily scheduled job", params:[], pre:[],
     steps:["Auto-expire: ACTIVE licenses with notAfter<today → EXPIRED (re-signed, history EXPIRE), returns count.","Reminder: emails near-expiry licenses not yet reminded, sets expiryReminded=true."],
     post:["Runs daily via @Scheduled; can also trigger instantly via buttons."] },
   { fid:"fn-license-pub", name:"Public Keys / Signed CRL / Verify (public)", perm:"public (/pub/**)",
     ep:["GET/POST","/pub/license/public-keys · /pub/crl · /api/licenses/verify"],
     entry:"Called by client SDK, no login", params:[{n:"lic",t:"String",r:0,d:"verify: pass .lic text, returns valid/claims"}], pre:[],
     steps:["public-keys: JWKS-style with kid for rotation.","CRL: payloadB64+signature; SDK verifies then rejects listed licenses.","verify: server validates signature and returns parsed claims."], post:[] },
  ]},

{ id:"m-online", e:"📡", t:"Online Monitoring", intro:"Observe SDK instances, heartbeats, seats, grace; plus SDK activate/heartbeat/release channel.", perm:"online",
  functions:[
   { fid:"fn-online-instances", name:"Instances / Seats / Stats", perm:"online:view",
     ep:["GET","/api/online/instances · /seats · /stats"],
     entry:"Console → Online Monitoring (Online.vue, 5s polling)", params:[], pre:[],
     steps:["Instance table: licenseId/instanceId/machineCode/IP/state/activatedAt/lastHeartbeat.","State: online / grace (stale but <24h) / offline / released.","Seats: used/total (used = ACTIVE with heartbeat in grace); stat cards: online/grace/used seats."], post:[] },
   { fid:"fn-online-sdk", name:"SDK channel: activate / heartbeat / deactivate", perm:"SDK (mTLS+signing advised)",
     ep:["POST","/sdk/activate · /sdk/heartbeat · /sdk/deactivate"],
     entry:"Called by the client SDK, not a console action",
     pre:["License exists, ACTIVE, not revoked/expired","Activate needs free seats>0 (else 409)","Heartbeat nonce must be unique (anti-replay)"],
     params:[{n:"licenseId / instanceId",t:"String",r:1,d:"License & instance unique IDs (e.g. host+PID)"},
       {n:"machineCode",t:"String",r:0,d:"Machine fingerprint (activate)"},
       {n:"nonce",t:"String",r:1,d:"One-time random for heartbeat (anti-replay)"},
       {n:"ts",t:"Long",r:0,d:"Client timestamp (optional, for time check)"}],
     steps:["activate: returns signed authSnapshot (offline grace), heartbeatSec, graceSec, seat usage.","heartbeat: reports every heartbeatSec; returns OK/REVOKED/EXPIRED/REPLAY.","deactivate: releases the instance → RELEASED, seat reclaimed."],
     post:["Writes/updates LicenseInstance; nonce stored in NonceGuard (Redis when <code>APP_REDIS_ENABLED=true</code>); audits instance events."] },
  ]},

{ id:"m-catalog", e:"📦", t:"Product / Plan / Subscription", intro:"Product-module-feature-version matrix; plan pricing; subscriptions auto-issue licenses and bill.", perm:"catalog / plan",
  functions:[
   { fid:"fn-catalog-products", name:"Product Matrix / Feature-Version Availability", perm:"catalog:view",
     ep:["GET","/api/catalog/products · /api/catalog/matrix"],
     entry:"Console → Products & Versions (Products.vue)", params:[], pre:[],
     steps:["Left: product (CODEMAN) → modules (RISK/REPORT/AUDIT/BI/DATA) → features.","Right: feature × version (v2.2/v2.3/v2.4) availability matrix."], post:[] },
   { fid:"fn-plan-list", name:"Plan List", perm:"plan:view", ep:["GET","/api/plans"],
     entry:"Console → Plans & Subscriptions (Plans.vue, plan cards)", params:[], pre:[],
     steps:["View plans: code/name/price/version range/seats/modules.","Seed: Basic ¥19800·2 / Professional ¥49800·5 / Enterprise ¥99800·20 / Flagship ¥198000·50 seats."], post:[] },
   { fid:"fn-sub-create", name:"Create Subscription (auto-issue + auto-bill)", perm:"plan:subscribe", ep:["POST","/api/subscriptions"],
     entry:"Plan card → “Subscribe” dialog", pre:["Plan exists","endAt after startAt"],
     params:[{n:"tenantCode",t:"String",r:1,d:"Tenant code"},{n:"customer",t:"String",r:1,d:"Customer name"},
       {n:"planCode",t:"String",r:1,d:"BASIC/PROFESSIONAL/ENTERPRISE/FLAGSHIP"},{n:"qty",t:"Integer",r:0,d:"Quantity, default 1"},

     <table class="ref"><tr><th>Variable</th><th>Description</th></tr>
     <tr><td><code>JWT_SECRET</code> / <code>JWT_TTL_HOURS</code></td><td>JWT secret (change in prod) / lifetime (default 12h)</td></tr>
     <tr><td><code>LICENSE_SIGN_ALGO</code></td><td>Signature algorithm ed25519 / sm2</td></tr>

/* ===== Render engine (identical to help.html) ===== */
const main=document.getElementById('main'), nav=document.getElementById('nav');
let mode='flow';
const FNMAP={}; MOD.forEach(m=>m.functions.forEach(f=>FNMAP[f.fid]=m.id));
function renderFn(f,idx){
  let h=`<div class="fn" id="${f.fid}">`;
  h+=`<div class="fnh"><span class="num">${idx}</span>${f.name}`;
  if(f.perm) h+=` <span class="tag perm">perm ${f.perm}</span>`;
  h+=`</div>`;
  if(f.ep && f.ep[0]!=='-') h+=`<div class="ep"><span class="m">${f.ep[0]}</span> ${f.ep[1]}</div>`;
  if(f.html){ h+=f.html; h+=`</div>`; return h; }
  if(f.entry && f.entry!=='-') h+=`<div class="blk"><div class="lab">Entry</div><div class="desc" style="margin:0">${f.entry}</div></div>`;
  if(f.pre&&f.pre.length) h+=`<div class="blk"><div class="lab">Preconditions</div><ul class="tick">${f.pre.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  if(f.params&&f.params.length){
    h+=`<div class="blk"><div class="lab">Parameters</div><table class="params"><tr><th>Param</th><th>Type</th><th>Req.</th><th>Description</th></tr>`;
    h+=f.params.map(p=>`<tr><td class="n">${p.n}</td><td>${p.t}</td><td>${p.r?'<span class="req">required</span>':'<span class="opt">optional</span>'}</td><td>${p.d}</td></tr>`).join('');
    h+=`</table></div>`;
  }
  if(f.steps&&f.steps.length) h+=`<div class="blk"><div class="lab">Steps</div><ol class="mini">${f.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>`;
  if(f.post&&f.post.length) h+=`<div class="blk"><div class="lab">Result / Postconditions</div><ul class="dash">${f.post.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  if(f.code) h+=`<pre>${f.code.replace(/^# .*/gm,m=>`<span class="c">${m}</span>`)}</pre>`;
  if(f.notes) h+=f.notes.map(n=>`<div class="note ${n.k}"><span class="lab">${n.k==='tip'?'Tip':n.k==='warn'?'Note':'FAQ'}</span>${n.t}</div>`).join('');
  h+=`</div>`; return h;
}
function renderMod(m){
  let h=`<div class="crumbs">Module / ${m.t}</div><h1>${m.e} ${m.t}</h1><p class="intro">${m.intro}</p>`;
  m.functions.forEach((f,i)=>h+=renderFn(f,i+1));
  return h;
}
function renderFlow(f){
  const title=f.t.replace(/^Workflow \d+ · /,'');
  let h=`<div class="crumbs">Workflow / ${title}</div><h1>${f.e} <span class="gr">${title}</span></h1><p class="intro">${f.intro}</p>`;
  f.blocks.forEach(b=>{
    h+=`<h2 class="sec">${b.h}</h2>`;
    if(b.pre) h+=`<ul class="tick">${b.pre.map(x=>`<li>${x}</li>`).join('')}</ul>`;
    if(b.steps){
      h+=`<ol class="steps">`+b.steps.map(s=>{
        let li=`<li><b>${s.b}</b> <span class="h">${s.d}</span>`;
        if(s.see) li+=`<div class="seewrap">`+s.see.map(x=>`<span class="see" data-go="${x.go}">🔗 ${x.label}</span>`).join('')+`</div>`;
        return li+`</li>`;
      }).join('')+`</ol>`;
    }
  });
  if(f.notes) h+=f.notes.map(n=>`<div class="note ${n.k}"><span class="lab">${n.k==='tip'?'Tip':n.k==='warn'?'Note':'FAQ'}</span>${n.t}</div>`).join('');
  return h;
}
function allDocs(){return FLOW.concat(MOD);}
function pager(d){
  const list=FLOW.some(x=>x.id===d.id)?FLOW:MOD, i=list.findIndex(x=>x.id===d.id), prev=list[i-1], next=list[i+1];
  return `<div class="pager">${prev?`<a data-go="${prev.id}"><small>← Prev</small>${prev.e} ${prev.t}</a>`:`<span style="flex:1"></span>`}${next?`<a class="n" data-go="${next.id}"><small>Next →</small>${next.e} ${next.t}</a>`:`<span style="flex:1"></span>`}</div>`;
}
function renderDocs(){
  main.innerHTML = FLOW.map(f=>`<section class="doc" id="${f.id}">${renderFlow(f)}${pager(f)}</section>`).join('')
    + MOD.map(m=>`<section class="doc" id="${m.id}">${renderMod(m)}${pager(m)}</section>`).join('');
}
function renderNav(){
  const list=mode==='flow'?FLOW:MOD, title=mode==='flow'?'By Workflow':'By Module';
  nav.innerHTML=`<div class="navgrp"><h4>${title}</h4>`+list.map(d=>{
    let sub='';
    if(mode==='mod'&&d.functions) sub=`<div class="subnav" id="sub-${d.id}">`+d.functions.map(f=>`<span class="sublink" data-go="${f.fid}">${f.name}</span>`).join('')+`</div>`;
    return `<div class="navlink" data-go="${d.id}"><span class="e">${d.e}</span><span>${d.t}</span></div>${sub}`;
  }).join('')+`</div>`;
}
function show(target){
  let docId=target, anchor=null;
  if(FNMAP[target]){docId=FNMAP[target];anchor=target;}
  const inFlow=FLOW.some(x=>x.id===docId);
  if((inFlow&&mode!=='flow')||(!inFlow&&mode!=='mod')){mode=inFlow?'flow':'mod';setTab();renderNav();}
  document.querySelectorAll('section.doc').forEach(s=>s.classList.toggle('show',s.id===docId));
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.go===docId));
  document.querySelectorAll('.subnav').forEach(s=>s.classList.toggle('show',s.id==='sub-'+docId));
  if(anchor){
    const el=document.getElementById(anchor);
    if(el){el.scrollIntoView({block:'start'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1600);}
    history.replaceState(null,'','#'+anchor);
  }else{window.scrollTo({top:0,behavior:'smooth'});history.replaceState(null,'','#'+docId);}
  closeAside();
}
function setTab(){document.getElementById('tabFlow').classList.toggle('on',mode==='flow');document.getElementById('tabMod').classList.toggle('on',mode==='mod');}
document.getElementById('tabFlow').onclick=()=>{mode='flow';setTab();renderNav();show(FLOW[0].id);};
document.getElementById('tabMod').onclick=()=>{mode='mod';setTab();renderNav();show(MOD[0].id);};
document.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g){e.preventDefault();show(g.dataset.go);}});
const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){renderNav();return;}
  const hits=[];
  FLOW.forEach(f=>{if((f.t+JSON.stringify(f.blocks)).toLowerCase().includes(q))hits.push({go:f.id,e:f.e,t:f.t,sub:'Workflow'});});
  MOD.forEach(m=>{
    m.functions.forEach(f=>{if((f.name+JSON.stringify(f.params||[])+JSON.stringify(f.steps||[])+(f.entry||'')).toLowerCase().includes(q))hits.push({go:f.fid,e:m.e,t:f.name,sub:m.t});});
    if(m.t.toLowerCase().includes(q))hits.push({go:m.id,e:m.e,t:m.t,sub:'Module'});
  });
  nav.innerHTML=`<div class="navgrp"><h4>Results (${hits.length})</h4>`+(hits.length?hits.map(h=>`<div class="navlink" data-go="${h.go}"><span class="e">${h.e}</span><span>${h.t} <span style="color:var(--dim);font-size:11px">· ${h.sub}</span></span></div>`).join(''):`<div class="nohit">No match</div>`)+`</div>`;
});
const aside=document.getElementById('aside');
document.getElementById('menubtn').onclick=()=>aside.classList.toggle('open');
function closeAside(){if(window.innerWidth<=880)aside.classList.remove('open');}
renderDocs();renderNav();
const start=(location.hash||'').slice(1);
show((FNMAP[start]||allDocs().some(d=>d.id===start))?start:FLOW[0].id);
</script>
