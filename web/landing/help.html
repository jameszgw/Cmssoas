<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CODEMAN 操作帮助中心 · 按流程 / 按模块（含每功能详解）</title>
<meta name="description" content="CODEMAN 平台全功能详细操作帮助：按操作流程（步骤清晰、关联到具体功能）与按功能模块（细分到每个功能点，含前置/后置条件、所需系统与用户参数、权限、入口与逐步操作）。" />
<style>
  :root{
    --bg:#0a0e1a; --panel:#0f1628; --card:#121a30; --card2:#16203a;
    --line:#22304f; --txt:#e8edf7; --mut:#9fb0cd; --dim:#6f80a0;
    --acc:#4f8cff; --acc2:#7c4dff; --ok:#23c483; --warn:#ffb547; --bad:#ff6b6b;
    --grad:linear-gradient(120deg,#4f8cff 0%,#7c4dff 60%,#23c483 120%);
    --side:300px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font:15px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Arial,sans-serif;
    color:var(--txt);background:radial-gradient(1100px 600px at 90% -10%,rgba(124,77,255,.14),transparent 60%),var(--bg)}
  a{color:var(--acc);text-decoration:none}
  code,kbd{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.86em;background:rgba(124,77,255,.14);
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#cfe0ff}
  /* top bar */
  header{position:sticky;top:0;z-index:30;height:60px;display:flex;align-items:center;gap:16px;padding:0 20px;
    background:rgba(10,14,26,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .logo{width:28px;height:28px;border-radius:7px;background:var(--grad);display:grid;place-items:center;font-weight:900;color:#fff}
  header .sp{flex:1}
  header a.lk{color:var(--mut);font-size:13.5px;padding:6px 10px;border-radius:8px}
  header a.lk:hover{color:#fff;background:rgba(255,255,255,.06)}
  #search{background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--txt);
    padding:8px 12px;width:240px;font-size:14px;outline:none}
  #search:focus{border-color:var(--acc)}
  /* layout */
  .layout{display:flex;min-height:calc(100vh - 60px)}
  aside{width:var(--side);flex:0 0 var(--side);border-right:1px solid var(--line);
    position:sticky;top:60px;height:calc(100vh - 60px);overflow:auto;padding:16px 12px}
  .tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px}
  .tabs button{flex:1;border:0;background:transparent;color:var(--mut);font-weight:700;font-size:13.5px;
    padding:8px;border-radius:7px;cursor:pointer;transition:.2s}
  .tabs button.on{background:var(--grad);color:#fff}
  .navgrp{margin-bottom:10px}
  .navgrp h4{margin:14px 8px 6px;font-size:11.5px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase}
  .navlink{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--mut);
    font-size:14px;cursor:pointer;transition:.15s}
  .navlink:hover{background:rgba(255,255,255,.05);color:#fff}
  .navlink.active{background:rgba(79,140,255,.16);color:#fff;border-left:2px solid var(--acc)}
  .navlink .e{width:18px;text-align:center}
  .subnav{margin:2px 0 6px 10px;border-left:1px solid var(--line);padding-left:6px;display:none}
  .subnav.show{display:block}
  .sublink{display:block;padding:4px 8px;border-radius:6px;color:var(--dim);font-size:12.7px;cursor:pointer}
  .sublink:hover{background:rgba(255,255,255,.05);color:#cfe0ff}
  /* main */
  main{flex:1;min-width:0;padding:30px 40px 90px;max-width:960px}
  .crumbs{color:var(--dim);font-size:13px;margin-bottom:6px}
  h1{font-size:28px;margin:0 0 6px;font-weight:850}
  h1 .gr{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .intro{color:var(--mut);margin:0 0 22px;font-size:15px}
  section.doc{display:none;animation:fade .25s ease}
  section.doc.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:20px;margin:30px 0 4px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
  h2.sec .e{font-size:22px}
  h2.sec:first-of-type{border-top:0;padding-top:0;margin-top:6px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
  .tag{font-size:12px;border-radius:7px;padding:4px 10px;border:1px solid var(--line);background:var(--card);white-space:nowrap}
  .tag.perm{color:#bcd0ff;border-color:rgba(79,140,255,.4);background:rgba(79,140,255,.1)}
  .tag.role{color:#d8c6ff;border-color:rgba(124,77,255,.4);background:rgba(124,77,255,.1)}
  .tag.pre{color:#a9e8cf;border-color:rgba(35,196,131,.4);background:rgba(35,196,131,.1)}
  .desc{color:var(--mut);margin:0 0 14px}
  /* flow steps */
  ol.steps{counter-reset:s;list-style:none;padding:0;margin:0 0 14px}
  ol.steps>li{position:relative;padding:10px 0 12px 44px;border-bottom:1px dashed rgba(34,48,79,.7)}
  ol.steps>li:last-child{border-bottom:0}
  ol.steps>li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:9px;
    width:28px;height:28px;border-radius:8px;background:var(--grad);color:#fff;font-weight:800;font-size:13px;display:grid;place-items:center}
  ol.steps>li b{color:var(--txt)}
  ol.steps>li .h{color:var(--mut)}
  .see{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:12.5px;
    border:1px solid rgba(79,140,255,.4);background:rgba(79,140,255,.08);color:#bcd0ff;border-radius:999px;padding:3px 10px;cursor:pointer}
  .see:hover{background:rgba(79,140,255,.18);color:#fff}
  .seewrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
  /* function card */
  .fn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0;scroll-margin-top:74px}
  .fn:target,.fn.flash{border-color:var(--acc);box-shadow:0 0 0 2px rgba(79,140,255,.25)}
  .fnh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 8px;font-size:17px;font-weight:800}
  .fnh .num{width:24px;height:24px;border-radius:7px;background:rgba(124,77,255,.18);border:1px solid var(--line);
    color:#d8c6ff;font-size:12px;font-weight:800;display:grid;place-items:center}
  .ep{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;color:#9fe0c4;background:#0b1020;
    border:1px solid var(--line);border-radius:7px;padding:4px 10px;display:inline-block;margin:2px 0 10px}
  .ep .m{color:#ffb547;font-weight:700}
  .blk{margin:10px 0}
  .blk .lab{font-weight:800;font-size:12.5px;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;margin-bottom:5px}
  ul.tick,ul.dash{margin:0;padding-left:2px;list-style:none}
  ul.tick li,ul.dash li{position:relative;padding:3px 0 3px 20px;color:var(--mut);font-size:14px}
  ul.tick li::before{content:"✓";position:absolute;left:0;color:var(--ok);font-weight:800}
  ul.dash li::before{content:"→";position:absolute;left:0;color:var(--acc)}
  ol.mini{margin:0;padding-left:20px;color:var(--mut)}
  ol.mini li{padding:2px 0;font-size:14px}
  ol.mini li b{color:var(--txt)}
  table.params{border-collapse:collapse;width:100%;margin:6px 0;font-size:13px}
  table.params th,table.params td{border:1px solid var(--line);padding:6px 10px;text-align:left;vertical-align:top}
  table.params th{background:var(--card2);color:var(--txt);white-space:nowrap}
  table.params td{color:var(--mut)}
  table.params td.n{color:#cfe0ff;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;white-space:nowrap}
  .req{color:var(--bad);font-weight:700}.opt{color:var(--dim)}
  .note{border-radius:9px;padding:9px 14px;margin:9px 0;font-size:13.5px;border:1px solid var(--line)}
  .note .lab{font-weight:800;margin-right:6px}
  .note.tip{background:rgba(35,196,131,.08);border-color:rgba(35,196,131,.3);color:#bdf0da}.note.tip .lab{color:var(--ok)}
  .note.warn{background:rgba(255,181,71,.08);border-color:rgba(255,181,71,.3);color:#ffe0b0}.note.warn .lab{color:var(--warn)}
  .note.faq{background:rgba(255,107,107,.07);border-color:rgba(255,107,107,.3);color:#ffd2d2}.note.faq .lab{color:var(--bad)}
  pre{background:#0b1020;border:1px solid var(--line);border-radius:10px;padding:13px 15px;overflow:auto;
    font:12.5px/1.6 "SF Mono",Menlo,Consolas,monospace;color:#cfe0ff;margin:10px 0}
  pre .c{color:#5f7299}
  table.ref{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px}
  table.ref th,table.ref td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  table.ref th{background:var(--card2)}table.ref td{color:var(--mut)}
  .pager{display:flex;justify-content:space-between;gap:12px;margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
  .pager a{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px;color:var(--mut);transition:.2s}
  .pager a:hover{border-color:var(--acc);color:#fff}.pager a.n{text-align:right}
  .pager small{display:block;color:var(--dim);font-size:11.5px}
  .nohit{color:var(--dim);padding:40px 0;text-align:center}
  .menubtn{display:none;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 12px;cursor:pointer}
  @media(max-width:880px){
    aside{position:fixed;left:0;top:60px;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;box-shadow:0 20px 60px rgba(0,0,0,.6)}
    aside.open{transform:none}
    main{padding:24px 16px 60px}.menubtn{display:inline-block}#search{width:130px}header .lk{display:none}
  }
</style>
</head>
<body>

<header>
  <button class="menubtn" id="menubtn">☰</button>
  <a class="brand" href="index.html"><span class="logo">C</span>CODEMAN 帮助中心</a>
  <span class="sp"></span>
  <input id="search" type="search" placeholder="搜索功能 / 操作 / 参数…" autocomplete="off" />
  <a class="lk" href="help-en.html">EN</a>
  <a class="lk" href="index.html">官宣页</a>
  <a class="lk" href="../../docs/使用手册-从部署到应用.md">手册(MD)</a>
</header>

<div class="layout">
  <aside id="aside">
    <div class="tabs">
      <button id="tabFlow" class="on" data-mode="flow">按操作流程</button>
      <button id="tabMod" data-mode="mod">按功能模块</button>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main id="main"></main>
</div>

<script>
/* =========================================================
   数据模型
   - FLOW:操作流程(步骤清晰 + 关联到具体功能 fid)
   - MOD :功能模块(细分到每个功能点;每功能含 权限/入口/前置/参数/步骤/后置/提示)
   每个 MOD.functions[i].fid 为全局锚点,流程步骤通过 see:[{go:fid,label}] 关联
   ========================================================= */

/* ---------- 功能模块(细分到功能点) ---------- */
const MOD = [
{ id:"m-tenant", e:"🏢", t:"租户管理", intro:"开通、激活、续期与隔离配置;每个租户拥有独立隔离空间。", perm:"tenant",
  functions:[
   { fid:"fn-tenant-onboard", name:"开通租户", perm:"tenant:onboard", ep:["POST","/api/tenants"],
     entry:"控制台 → 租户管理 → 「开通租户」对话框(Tenants.vue)",
     pre:["登录账号具备 <code>tenant:onboard</code>","租户名称不重复"],
     params:[
       {n:"name",t:"String",r:1,d:"租户名称,如「华东数据科技有限公司」"},
       {n:"email",t:"String",r:1,d:"管理员邮箱(用于接收激活邮件,须合法邮箱)"},
       {n:"plan",t:"String",r:0,d:"套餐:基础版/专业版/企业版/旗舰版"},
       {n:"version",t:"String",r:0,d:"产品版本,默认 v2.4.0"},
       {n:"isolation",t:"String",r:0,d:"隔离级别:共享库·行级(RLS,默认)/独立 Schema/独立数据库"},
       {n:"mode",t:"String",r:0,d:"授权模式:混合 HYBRID(默认)/在线 ONLINE/离线 OFFLINE"},
     ],
     steps:["填写名称、管理员邮箱;选择套餐、版本、隔离级别与授权模式。",
       "右侧实时预览开通邮件内容,确认无误后提交。",
       "系统生成租户编号(如 <code>T-100482</code>)并返回邮件发送结果。"],
     post:["建租户记录(INITIALIZING→ACTIVE)并创建隔离 Schema、跑 Flyway 迁移、写默认角色种子。",
       "创建 SUPER_ADMIN(待激活)+ 生成 MFA 密钥与一次性激活令牌。",
       "异步发送开通邮件(含激活链接);审计 <code>TENANT_CREATED</code>。"],
     notes:[{k:"faq",t:"邮件没收到?检查 SMTP(<code>APP_MAIL_*</code>)与发件箱(outbox)状态,可让管理员凭激活页链接直接激活。"}] },
   { fid:"fn-tenant-list", name:"租户列表", perm:"tenant:view", ep:["GET","/api/tenants"],
     entry:"控制台 → 租户管理(主表)",
     params:[], pre:[],
     steps:["查看全部租户:编号/名称/邮箱/套餐/状态/到期。","状态枚举:active(正常)/soon(暂停)/init(初始化中)/exp(失败)。"],
     post:[] },
   { fid:"fn-tenant-settings", name:"查看隔离配置", perm:"tenant:view", ep:["GET","/api/tenants/{code}/settings"],
     entry:"控制台 → 租户行 → 设置/详情",
     params:[{n:"code",t:"Path",r:1,d:"租户编号"}],
     pre:["租户编号存在"],
     steps:["查看该租户 Schema 名、配置项与角色数。"], post:[] },
   { fid:"fn-tenant-activate", name:"激活账户(客户侧·公开)", perm:"公开(令牌校验)", ep:["GET/POST","/api/activation/{token}"],
     entry:"客户打开激活页 <code>/activate/:token</code>(Activate.vue)",
     pre:["激活令牌有效未过期","管理员处于 PENDING_ACTIVATION"],
     params:[
       {n:"password",t:"String",r:1,d:"管理员密码,长度 8–64"},
       {n:"mfaCode",t:"String",r:0,d:"可选 MFA 验证码;填写则绑定 MFA"},
     ],
     steps:["GET 取激活信息(租户名/邮箱/MFA 二维码 otpauth)。","设置密码,(可选)扫码绑定 MFA 并填验证码。","POST 提交激活。"],
     post:["设置密码哈希;管理员状态→ACTIVE;(可选)绑定 MFA;审计 <code>ADMIN_ACTIVATED</code>。"] },
  ]},

{ id:"m-license", e:"🔑", t:"License 授权", intro:"签发/续期/变更/吊销/下载/导出/到期停用/到期提醒/CRL/公钥/验签;Ed25519 默认、国密 SM2 可选。", perm:"license",
  functions:[
   { fid:"fn-license-issue", name:"签发 License", perm:"license:issue", ep:["POST","/api/licenses/issue"],
     entry:"控制台 → License 授权 → 「签发」(Licensing.vue)",
     pre:["具备 <code>license:issue</code>","租户存在","<code>notAfter</code> 晚于 <code>notBefore</code>"],
     params:[
       {n:"tenantCode",t:"String",r:1,d:"租户编号"},
       {n:"customer",t:"String",r:1,d:"客户名称"},
       {n:"productCode",t:"String",r:0,d:"产品码,默认 CODEMAN"},
       {n:"edition",t:"String",r:0,d:"版型 BASIC/PROFESSIONAL/ENTERPRISE/FLAGSHIP,默认 ENTERPRISE"},
       {n:"mode",t:"String",r:0,d:"OFFLINE/ONLINE/HYBRID,默认 HYBRID"},
       {n:"modules",t:"List",r:1,d:"授权模块,如 RISK/REPORT/AUDIT/BI/DATA"},
       {n:"features",t:"Map",r:0,d:"功能开关/配额,如 {\"REPORT.EXPORT\":true,\"MAX_USERS\":2000}"},
       {n:"appVersionRange",t:"String",r:0,d:"SemVer 范围,如 >=2.0.0 <3.0.0"},
       {n:"notBefore / notAfter",t:"Date",r:1,d:"生效 / 失效日期(ISO)"},
       {n:"concurrency",t:"Integer",r:0,d:"并发席位数,默认 1"},
       {n:"reason",t:"String",r:0,d:"审计原因,如「控制台签发」"},
     ],
     steps:["选择租户/客户/版型/模式;勾选模块与功能开关。","设置版本范围、生效与失效日期、并发席位。","提交签发,服务端私钥签名生成 <code>.lic</code>。"],
     post:["License 记录 status=ACTIVE,version=1,生成水印 watermark。","claimsJson 经 Ed25519 签名(存 kid+signature);写历史 opType=ISSUE;审计 <code>LICENSE_ISSUED</code>。"],
     notes:[{k:"warn",t:"私钥不出域;客户端仅持公钥验签。签名算法由 <code>LICENSE_SIGN_ALGO</code>(ed25519/sm2)控制。"}] },
   { fid:"fn-license-renew", name:"续期", perm:"license:renew", ep:["POST","/api/licenses/{id}/renew"],
     entry:"License 列表 → 行操作「续期」",
     pre:["License 存在且为 ACTIVE","新 notAfter 晚于当前 notBefore"],
     params:[{n:"notAfter",t:"Date",r:1,d:"新失效日期"},{n:"reason",t:"String",r:0,d:"审计原因"}],
     steps:["弹窗预填当前失效日期,改为新日期。","提交后 License 重新签名、版本号 +1。"],
     post:["notAfter 更新;version 自增;重签;写历史 RENEW;审计 <code>LICENSE_RENEWED</code>。"] },
   { fid:"fn-license-modify", name:"变更(模块/功能/席位/版型)", perm:"license:issue", ep:["POST","/api/licenses/{id}/modify"],
     entry:"License 列表 → 行操作「变更」",
     pre:["License 存在且为 ACTIVE"],
     params:[{n:"modules",t:"List",r:0,d:"新模块列表"},{n:"features",t:"Map",r:0,d:"新功能开关"},
       {n:"appVersionRange",t:"String",r:0,d:"新版本范围"},{n:"concurrency",t:"Integer",r:0,d:"新席位"},
       {n:"edition",t:"String",r:0,d:"新版型"},{n:"reason",t:"String",r:0,d:"审计原因"}],
     steps:["仅填写需变更的字段。","提交后按新内容重签、版本 +1。"],
     post:["对应字段更新;version 自增;重签;写历史 MODIFY;审计 <code>LICENSE_MODIFIED</code>。"] },
   { fid:"fn-license-revoke", name:"吊销", perm:"license:revoke", ep:["POST","/api/licenses/{id}/revoke"],
     entry:"License 列表 → 行操作「吊销」(警示确认)",
     pre:["License 存在且为 ACTIVE"],
     params:[{n:"reason",t:"String",r:0,d:"吊销原因,如「客户违约」"}],
     steps:["确认吊销并填写原因。","提交后状态→REVOKED 并进入 CRL。"],
     post:["status=REVOKED;加入吊销名单 CRL;version 自增、重签;写历史 REVOKE;离线 SDK 据 CRL 拒绝。"] },
   { fid:"fn-license-list", name:"列表 / 详情 / 历史", perm:"license:view / 公开(详情·历史)",
     ep:["GET","/api/licenses · /{id} · /{id}/history"],
     entry:"控制台 → License 授权(主表 + 详情抽屉)",
     params:[], pre:[],
     steps:["列表查看 ID/租户/客户/版型/状态/到期/版本。","详情含 claimsJson 与签名;历史含每版本 opType(ISSUE/RENEW/MODIFY/REVOKE/EXPIRE)与操作者、原因。"],
     post:[] },
   { fid:"fn-license-download", name:"下载 .lic / 导出 CSV", perm:"license:view",
     ep:["GET","/api/licenses/{id}/download · /export.csv"],
     entry:"License 行操作「下载」/ 列表「导出 CSV」",
     params:[], pre:["下载需鉴权携带 JWT(blob 下载已修复丢 token 问题)"],
     steps:["「下载」获取 <code>{licenseId}.lic</code> 文本文件交付客户。","「导出 CSV」导出授权台账。"], post:[] },

   { fid:"fn-harden-config", name:"加固设置(按租户)", perm:"harden:config(保存) / harden:view(读取)",
     ep:["GET/PUT","/api/harden/config · /configs · (PUT)/config"],
     entry:"控制台 → 在线加固 → 「加固设置」(Harden.vue)",
     pre:["保存需 <code>harden:config</code>"],
     params:[
       {n:"tenantCode",t:"String",r:0,d:"租户码(空=平台级)"},
       {n:"mode",t:"Enum",r:1,d:"BUILD(仅构建自建)/ONLINE(仅平台在线)/BOTH(并存)"},
       {n:"obfuscate",t:"Boolean",r:0,d:"默认启用 ProGuard 混淆"},
       {n:"encryptBind",t:"Boolean",r:0,d:"默认启用 类加密+License 绑定"},
       {n:"fatjarEncrypt",t:"Boolean",r:0,d:"默认启用 口令式类加密"},
     ],
     steps:["选模式与默认技术 → 保存。"],
     post:["租户设为 BUILD 时,平台拒绝其在线加固任务。"] },
   { fid:"fn-harden-submit", name:"提交在线加固(上传 jar)", perm:"harden:run", ep:["POST","/api/harden/jobs (multipart)"],
     entry:"控制台 → 在线加固 → 「提交在线加固」",
     pre:["租户模式非 BUILD","文件为 .jar 且 ≤ <code>HARDEN_MAX_FILE_MB</code>(默认 200)"],
     params:[
       {n:"file",t:"File",r:1,d:"可执行 jar(multipart)"},
       {n:"techniques",t:"CSV",r:0,d:"OBFUSCATE,ENCRYPT_BIND,FATJAR_ENCRYPT(按序执行)"},
       {n:"bindLicense",t:"String",r:0,d:"ENCRYPT_BIND 绑定的 License ID"},
       {n:"passphrase",t:"String",r:0,d:"FATJAR_ENCRYPT 的口令"},
       {n:"encryptPrefix",t:"String",r:0,d:"加密的包前缀(省略则自动推断)"},
       {n:"tenantCode",t:"String",r:0,d:"租户码"},
     ],
     steps:["上传 jar,勾选技术。","ENCRYPT_BIND 填 License ID;FATJAR_ENCRYPT 填口令;(可选)填加密包前缀。","提交 → 异步流水线 QUEUED→RUNNING→DONE/FAILED。"],
     post:["密钥派生:ENCRYPT_BIND 取 .lic 内容、FATJAR_ENCRYPT 取口令的 SHA-256;2 线程异步处理。"] },
   { fid:"fn-harden-jobs", name:"任务列表 / 详情 / 下载产物", perm:"harden:view",
     ep:["GET","/api/harden/jobs · /{id} · /{id}/download"],
     entry:"控制台 → 在线加固 → 任务表",
     params:[], pre:["下载需任务 DONE"],
     steps:["查看任务:jobNo/源文件/技术/状态/产物大小。","下载产物 <code>hardened-{源文件名}</code>。"],
     post:[],
     notes:[{k:"tip",t:"运行产物:<code>java -Dharden.license=&lt;.lic&gt; -jar x.jar</code>(绑定)或 <code>java -Dharden.key=&lt;口令&gt; -jar x.jar</code>(口令);也支持 HARDEN_LICENSE/HARDEN_KEY 环境变量。"},
       {k:"faq",t:"一直处理中/失败?检查 jar 可执行、未超大小、工作目录 <code>HARDEN_WORK_DIR</code> 可写。"}] },
  ]},

{ id:"m-portal", e:"🚪", t:"租户自助门户", intro:"运营为租户开通访问码;客户用「租户编号+访问码」登录,只读查看本租户授权。", perm:"tenant:portal",
  functions:[
   { fid:"fn-portal-admin", name:"门户管理(开通/重置/停用)", perm:"tenant:portal(开通·重置·停用) / tenant:view(列表)",
     ep:["GET/POST","/api/portal-admin · /{tenantCode}/enable · /reset · /disable"],
     entry:"控制台 → 自助门户(PortalAdmin.vue)",
     pre:["具备 <code>tenant:portal</code>"],
     params:[{n:"tenantCode",t:"Path",r:1,d:"目标租户编号"}],
     steps:["「开通」生成 8 位访问码(字母数字,排除易混 0/1/I/O)。","「复制」一键复制 租户编号+访问码+门户地址。","可「重置」访问码或「停用」门户。"],
     post:["开通/重置/停用分别审计 PORTAL_ENABLE/RESET/DISABLE。"] },
   { fid:"fn-portal-login", name:"门户登录 / 总览(客户侧·公开)", perm:"公开(门户令牌)",
     ep:["POST/GET","/pub/portal/login · /pub/portal/overview"],
     entry:"客户打开 <code>/portal</code>(Portal.vue → PortalHome.vue)",
     pre:["租户存在且门户已启用","访问码匹配"],
     params:[{n:"tenantCode",t:"String",r:1,d:"租户编号"},{n:"accessCode",t:"String",r:1,d:"访问码"}],
     steps:["用 编号+访问码 登录 → 颁发 role=TENANT_PORTAL 的令牌(存 localStorage <code>codeman.portal.token</code>)。",
       "总览只读查看 KPI 与 License/合同/账单/订阅(严格按租户过滤,他租户数据不可见)。"],
     post:["令牌缺失/失效返回 401;门户无任何写操作。"] },
  ]},

{ id:"m-rbac", e:"🔐", t:"角色权限 / 用户", intro:"多态权限树(NONE/VIEW/EDIT/FULL)+ 用户生命周期 + 登录/改密。", perm:"role:view / user:view",
  functions:[
   { fid:"fn-rbac-roles", name:"权限树 / 角色 / 设置角色权限", perm:"读取无需特权 / 设置需超管",
     ep:["GET/PUT","/api/rbac/permissions · /roles · /roles/{id} · (PUT)/roles/{id}/permissions"],
     entry:"控制台 → 角色权限(Roles.vue)",
     pre:["设置权限:超管校验"],
     params:[{n:"权限项",t:"{code,mode}[]",r:1,d:"mode ∈ NONE/VIEW/EDIT/FULL"}],
     steps:["选角色 → 权限树逐节点选择 无/只读/编辑/完全。","父节点级联到未设置的子节点 → 保存。"],
     post:["新增权限自动授予超管;VIEWER 默认只读;NONE 即不记录;审计 ROLE_PERM_UPDATE。"] },
   { fid:"fn-rbac-users", name:"用户管理(新建/重置/启停)", perm:"user:view(列表) / user:edit(写)",
     ep:["GET/POST","/api/users · /{id}/reset-password · /{id}/toggle"],
     entry:"控制台 → 用户管理(Users.vue)",
     pre:["写操作需 <code>user:edit</code>"],
     params:[
       {n:"username",t:"String",r:1,d:"用户名(唯一,1–64)"},
       {n:"roleId",t:"Long",r:1,d:"角色 ID"},
       {n:"password",t:"String",r:0,d:"初始密码,空则默认 <code>Codeman@123</code>"},
     ],
     steps:["新建用户:指定角色与(可选)初始密码。","可重置密码、启用/停用账号。"],
     post:["新建与重置均置 mustChangePwd=true(首登强制改密);内置 admin 不可停用;审计 USER_CREATE/RESET_PWD/TOGGLE。"] },
   { fid:"fn-rbac-auth", name:"登录 / 当前用户 / 修改密码", perm:"无需特权(登录态)",
     ep:["POST/GET","/api/auth/login · /api/auth/me · /api/auth/change-password"],
     entry:"登录页(Login.vue)/ 首登强制改密弹层",
     pre:["登录:账号 status=ACTIVE"],
     params:[
       {n:"username / password",t:"String",r:1,d:"登录凭据"},
       {n:"oldPassword / newPassword",t:"String",r:1,d:"改密(新密 6–64)"},
     ],
     steps:["登录返回 token + 角色 + 生效权限(含 mode)+ mustChangePwd。","mustChangePwd=true 时强制改密后方可使用。"],
     post:["JWT 有效期 <code>JWT_TTL_HOURS</code>(默认 12h);密钥 <code>JWT_SECRET</code> 生产必改。"] },
  ]},

{ id:"m-ai", e:"🧠", t:"大模型接入", intro:"智能客服通用 OpenAI 兼容,换厂商只改 .env 三项。", perm:"配置",
  functions:[
   { fid:"fn-ai-config", name:"大模型配置", perm:"运维配置",
     ep:["-","application.yml / .env(app.ai.*)"],
     entry:".env / application.yml",
     pre:["可访问对应模型服务"],
     params:[

       {n:"AI_BASE_URL",t:"URL",r:0,d:"OpenAI 兼容端点,默认本地 Ollama"},
       {n:"AI_API_KEY",t:"String",r:0,d:"云厂商 API Key(本地 Ollama 不需要)"},
       {n:"AI_MODEL",t:"String",r:0,d:"模型 ID,如 glm-4-flash/deepseek-chat/qwen2.5:7b-instruct"},
       {n:"AI_TIMEOUT_SEC / AI_HISTORY_LIMIT",t:"Int",r:0,d:"超时(默认60)/ 历史条数(默认12)"},
     ],
     steps:[],
     post:[],
     notes:[{k:"tip",t:"示例见下;选型/成本对比见 <a href='../../docs/智能客服-大模型选型与部署.md'>智能客服-大模型选型与部署</a>。Docker 启本地模型:<code>docker compose --profile ai up -d</code> 后 <code>ollama pull</code>。"}],
     code:`# 智谱 GLM-4-Flash(常免费)
AI_ENABLED=true
AI_BASE_URL=https://open.bigmodel.cn/api/paas/v4
AI_API_KEY=***
AI_MODEL=glm-4-flash

# 本地 Ollama(离线)
AI_ENABLED=true
AI_BASE_URL=http://ollama:11434/v1
AI_MODEL=qwen2.5:7b-instruct` },
  ]},

     <tr><td>Prometheus / Grafana / Ollama</td><td>9090 / 3000 / 11434</td></tr></table></div>` },

/* ========================= 渲染 ========================= */
const main=document.getElementById('main'), nav=document.getElementById('nav');
let mode='flow';
const FNMAP={}; MOD.forEach(m=>m.functions.forEach(f=>FNMAP[f.fid]=m.id));
function esc(s){return s;}

/* —— 功能卡渲染 —— */
function renderFn(f,idx){
  let h=`<div class="fn" id="${f.fid}">`;
  h+=`<div class="fnh"><span class="num">${idx}</span>${f.name}`;
  if(f.perm) h+=` <span class="tag perm">权限 ${f.perm}</span>`;
  h+=`</div>`;
  if(f.ep && f.ep[0]!=='-') h+=`<div class="ep"><span class="m">${f.ep[0]}</span> ${f.ep[1]}</div>`;
  if(f.html){ h+=f.html; h+=`</div>`; return h; }
  if(f.entry && f.entry!=='-') h+=`<div class="blk"><div class="lab">入口</div><div class="desc" style="margin:0">${f.entry}</div></div>`;
  if(f.pre&&f.pre.length) h+=`<div class="blk"><div class="lab">前置条件</div><ul class="tick">${f.pre.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  if(f.params&&f.params.length){
    h+=`<div class="blk"><div class="lab">参数</div><table class="params"><tr><th>参数</th><th>类型</th><th>必填</th><th>说明</th></tr>`;
    h+=f.params.map(p=>`<tr><td class="n">${p.n}</td><td>${p.t}</td><td>${p.r?'<span class="req">必填</span>':'<span class="opt">可选</span>'}</td><td>${p.d}</td></tr>`).join('');
    h+=`</table></div>`;
  }
  if(f.steps&&f.steps.length) h+=`<div class="blk"><div class="lab">操作步骤</div><ol class="mini">${f.steps.map(s=>`<li>${s}</li>`).join('')}</ol></div>`;
  if(f.post&&f.post.length) h+=`<div class="blk"><div class="lab">结果 / 后置</div><ul class="dash">${f.post.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  if(f.code) h+=`<pre>${f.code.replace(/^# .*/gm,m=>`<span class="c">${m}</span>`)}</pre>`;
  if(f.notes) h+=f.notes.map(n=>`<div class="note ${n.k}"><span class="lab">${n.k==='tip'?'提示':n.k==='warn'?'注意':'常见问题'}</span>${n.t}</div>`).join('');
  h+=`</div>`; return h;
}
function renderMod(m){
  let h=`<div class="crumbs">功能模块 / ${m.t}</div><h1>${m.e} ${m.t}</h1><p class="intro">${m.intro}</p>`;
  m.functions.forEach((f,i)=>h+=renderFn(f,i+1));
  return h;
}
/* —— 流程渲染 —— */
function renderFlow(f){
  let h=`<div class="crumbs">操作流程 / ${f.t.replace(/^流程\d+ · /,'')}</div><h1>${f.e} ${f.t.replace(/^流程\d+ · /,'<span class="gr">')}</span></h1><p class="intro">${f.intro}</p>`;
  f.blocks.forEach(b=>{
    h+=`<h2 class="sec">${b.h}</h2>`;
    if(b.pre) h+=`<ul class="tick">${b.pre.map(x=>`<li>${x}</li>`).join('')}</ul>`;
    if(b.steps){
      h+=`<ol class="steps">`+b.steps.map(s=>{
        let li=`<li><b>${s.b}</b> <span class="h">${s.d}</span>`;
        if(s.see) li+=`<div class="seewrap">`+s.see.map(x=>`<span class="see" data-go="${x.go}">🔗 ${x.label}</span>`).join('')+`</div>`;
        return li+`</li>`;
      }).join('')+`</ol>`;
    }
  });
  if(f.notes) h+=f.notes.map(n=>`<div class="note ${n.k}"><span class="lab">${n.k==='tip'?'提示':n.k==='warn'?'注意':'常见问题'}</span>${n.t}</div>`).join('');
  return h;
}
function allDocs(){return FLOW.concat(MOD);}
function pager(d){
  const list=FLOW.some(x=>x.id===d.id)?FLOW:MOD, i=list.findIndex(x=>x.id===d.id), prev=list[i-1], next=list[i+1];
  return `<div class="pager">${prev?`<a data-go="${prev.id}"><small>← 上一篇</small>${prev.e} ${prev.t}</a>`:`<span style="flex:1"></span>`}${next?`<a class="n" data-go="${next.id}"><small>下一篇 →</small>${next.e} ${next.t}</a>`:`<span style="flex:1"></span>`}</div>`;
}
function renderDocs(){
  main.innerHTML = FLOW.map(f=>`<section class="doc" id="${f.id}">${renderFlow(f)}${pager(f)}</section>`).join('')
    + MOD.map(m=>`<section class="doc" id="${m.id}">${renderMod(m)}${pager(m)}</section>`).join('');
}
function renderNav(){
  const list=mode==='flow'?FLOW:MOD, title=mode==='flow'?'按操作流程':'按功能模块';
  nav.innerHTML=`<div class="navgrp"><h4>${title}</h4>`+list.map(d=>{
    let sub='';
    if(mode==='mod'&&d.functions) sub=`<div class="subnav" id="sub-${d.id}">`+d.functions.map(f=>`<span class="sublink" data-go="${f.fid}">${f.name}</span>`).join('')+`</div>`;
    return `<div class="navlink" data-go="${d.id}"><span class="e">${d.e}</span><span>${d.t}</span></div>${sub}`;
  }).join('')+`</div>`;
}
function show(target){
  let docId=target, anchor=null;
  if(FNMAP[target]){docId=FNMAP[target];anchor=target;}
  // 切换 tab 以匹配目标
  const inFlow=FLOW.some(x=>x.id===docId);
  if((inFlow&&mode!=='flow')||(!inFlow&&mode!=='mod')){mode=inFlow?'flow':'mod';setTab();renderNav();}
  document.querySelectorAll('section.doc').forEach(s=>s.classList.toggle('show',s.id===docId));
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.go===docId));
  document.querySelectorAll('.subnav').forEach(s=>s.classList.toggle('show',s.id==='sub-'+docId));
  if(anchor){
    const el=document.getElementById(anchor);
    if(el){el.scrollIntoView({block:'start'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1600);}
    history.replaceState(null,'','#'+anchor);
  }else{window.scrollTo({top:0,behavior:'smooth'});history.replaceState(null,'','#'+docId);}
  closeAside();
}
function setTab(){document.getElementById('tabFlow').classList.toggle('on',mode==='flow');document.getElementById('tabMod').classList.toggle('on',mode==='mod');}
document.getElementById('tabFlow').onclick=()=>{mode='flow';setTab();renderNav();show(FLOW[0].id);};
document.getElementById('tabMod').onclick=()=>{mode='mod';setTab();renderNav();show(MOD[0].id);};
document.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g){e.preventDefault();show(g.dataset.go);}});
const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){renderNav();return;}
  // 搜索:文档标题 + 模块功能名/参数
  const hits=[];
  FLOW.forEach(f=>{if((f.t+JSON.stringify(f.blocks)).toLowerCase().includes(q))hits.push({go:f.id,e:f.e,t:f.t,sub:'流程'});});
  MOD.forEach(m=>{
    m.functions.forEach(f=>{if((f.name+JSON.stringify(f.params||[])+JSON.stringify(f.steps||[])+(f.entry||'')).toLowerCase().includes(q))hits.push({go:f.fid,e:m.e,t:f.name,sub:m.t});});
    if(m.t.toLowerCase().includes(q))hits.push({go:m.id,e:m.e,t:m.t,sub:'模块'});
  });
  nav.innerHTML=`<div class="navgrp"><h4>搜索结果 (${hits.length})</h4>`+(hits.length?hits.map(h=>`<div class="navlink" data-go="${h.go}"><span class="e">${h.e}</span><span>${h.t} <span style="color:var(--dim);font-size:11px">· ${h.sub}</span></span></div>`).join(''):`<div class="nohit">无匹配,换个关键词</div>`)+`</div>`;
});
const aside=document.getElementById('aside');
document.getElementById('menubtn').onclick=()=>aside.classList.toggle('open');
function closeAside(){if(window.innerWidth<=880)aside.classList.remove('open');}
renderDocs();renderNav();
const start=(location.hash||'').slice(1);
show((FNMAP[start]||allDocs().some(d=>d.id===start))?start:FLOW[0].id);
</script>
</body>
