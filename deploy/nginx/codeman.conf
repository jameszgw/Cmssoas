# CODEMAN 前端 + 反向代理（CentOS7 nginx）
# 前端构建产物放 /opt/codeman/web ；放到 /etc/nginx/conf.d/codeman.conf
server {
    listen 80;
    server_name _;
    root /opt/codeman/web;
    index index.html;

    # 后端 API / SDK 在线通道反代
    location /api/ { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /sdk/ { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    # 可选：actuator 仅内网放行
    location /actuator/ { allow 127.0.0.1; deny all; proxy_pass http://127.0.0.1:8080; }

    # SPA 前端路由回退
    location / { try_files $uri $uri/ /index.html; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
