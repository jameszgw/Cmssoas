server:
  port: 8080

spring:
  application:
    name: license-platform

  # ---- 数据源：默认 H2 内存库（开箱即跑）。生产改 PostgreSQL ----
  datasource:
    url: jdbc:h2:mem:codeman;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true       # http://localhost:8080/h2-console

  jpa:
    hibernate:
      ddl-auto: none      # schema 完全由 Flyway 管理（跨 H2/PG 兼容）
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # 文件上传(在线代码加固上传 jar)
  servlet:
    multipart:
      max-file-size: ${HARDEN_MAX_FILE:200MB}
      max-request-size: ${HARDEN_MAX_REQUEST:210MB}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- 邮件（SMTP）。delivery=log 时不真正外发，仅渲染落盘+日志 ----
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ---- 应用自定义 ----
app:
  license:
    sign-algo: ${LICENSE_SIGN_ALGO:ed25519}   # 签名算法：ed25519（默认）| sm2（国密）
  cmreport:                                    # CmReport 产品线签发(RSA SHA256,与 CODEMAN 信任根隔离)
    key-file: ${CMREPORT_KEY_FILE:./var/keys/cmreport-rsa.json}
    rsa-priv: ${CMREPORT_RSA_PRIVATE_KEY:}     # KMS/env 注入 PKCS8 Base64(私钥不落盘);与 rsa-pub 成对
    rsa-pub: ${CMREPORT_RSA_PUBLIC_KEY:}       # X509 Base64
  jwt:
    secret: ${JWT_SECRET:codeman-dev-secret-please-change-in-prod-0123456789}
    ttl-hours: ${JWT_TTL_HOURS:12}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}   # true 时 nonce 走 Redis（多实例水平扩展）
  sdk:
    rate-limit-per-min: ${APP_SDK_RATE_LIMIT:120}   # SDK 在线通道每 IP 每分钟限流
  alert:
    wecom-webhook: ${ALERT_WECOM_WEBHOOK:}          # 企业微信群机器人地址；留空则禁用
  mail:
    delivery: ${APP_MAIL_DELIVERY:log}   # log | smtp
    from: ${APP_MAIL_FROM:no-reply@codeman.com}
    from-name: CODEMAN
    spool-dir: ./var/mail                 # delivery=log 时渲染后的邮件落盘目录
  activation:
    base-url: ${APP_ACTIVATION_BASE_URL:http://localhost:5173/activate}
    ttl-hours: 24
  # ---- 智能客服(通用、不绑定厂商)。统一 OpenAI 兼容接口，换厂商只改这几项 ----
  ai:
    enabled: ${AI_ENABLED:false}                 # 关闭时前端客服窗仍可用，回复走“知识库降级”
    base-url: ${AI_BASE_URL:http://127.0.0.1:11434/v1}   # 默认本地 Ollama(离线)；云 API 改为 https://open.bigmodel.cn/api/paas/v4 等
    api-key: ${AI_API_KEY:}                       # 本地模型留空；云 API 经 env/Nacos/KMS 注入，不落明文
    model: ${AI_MODEL:qwen2.5:7b-instruct}        # 云 API 改为 glm-4-flash / qwen-turbo / deepseek-chat ...
    timeout-sec: ${AI_TIMEOUT_SEC:60}
    history-limit: ${AI_HISTORY_LIMIT:12}
  # ---- 在线支付/收款(通用,不绑定渠道)。默认沙箱,换渠道改 provider ----
  pay:
    provider: ${PAY_PROVIDER:mock}               # mock(沙箱) | wechatpay | alipay | stripe
    notify-base-url: ${PAY_NOTIFY_BASE_URL:}     # 真实渠道异步回调可达的公网根地址
  # ---- 电子发票(通用,不绑定渠道)。默认沙箱,换渠道改 provider ----
  einvoice:
    provider: ${EINVOICE_PROVIDER:mock}          # mock(沙箱) | aisino(航信) | baiwang(百望)
  # ---- 在线代码加固(上传 jar→加固→下载)。与构建/打包加固并存 ----
  harden:
    work-dir: ${HARDEN_WORK_DIR:./var/harden}    # 上传源 jar 与加固产物存放目录
    max-file-mb: ${HARDEN_MAX_FILE_MB:200}

# ---- 可观测：Actuator + Prometheus 抓取端点 ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false    # 邮件走异步发件箱，SMTP 可选，不纳入健康探针
    redis:
      enabled: false    # 默认单机内存 nonce；prod profile 再开启
  metrics:
    tags:
      application: codeman   # 所有指标打上 application 标签，便于多服务区分
  prometheus:
    metrics:
      export:
        enabled: true

# 允许前端开发服务器跨域
cors:
  allowed-origins: http://localhost:5173,http://localhost:4173

logging:
  level:
    com.codeman: INFO
