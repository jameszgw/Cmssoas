# 生产 profile：PostgreSQL + Redis + SMTP（用 SPRING_PROFILES_ACTIVE=prod 启用）
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/cmssoas}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:cmssoas}
    password: ${DB_PASSWORD:cmssoas}
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# 生产开启 Redis 健康探针（Redis 为 nonce 后端，需纳入健康检查）
management:
  health:
    redis:
      enabled: true

app:
  redis:
    enabled: ${APP_REDIS_ENABLED:true}
  mail:
    delivery: ${APP_MAIL_DELIVERY:smtp}
  activation:
    base-url: ${APP_ACTIVATION_BASE_URL:http://localhost/activate}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost}
