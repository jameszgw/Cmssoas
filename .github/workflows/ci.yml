name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: 后端构建 (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build license-platform
        working-directory: server/license-platform
        run: mvn -B -ntp -DskipTests package

  sdk:
    name: 客户端 SDK 构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & install license-sdk
        working-directory: sdk/license-sdk
        run: mvn -B -ntp -DskipTests install
      - name: Build protected-app demo
        working-directory: examples/protected-app
        run: mvn -B -ntp -DskipTests compile

  frontend:
    name: 前端构建 (Vite/Vue3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build console
        working-directory: web/console
        run: |
          npm install
          npm run build
